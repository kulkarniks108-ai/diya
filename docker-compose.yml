version: '3.8'

networks:
  diya_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:

services:
  db:
    image: postgres:16-alpine
    container_name: diya-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-replace-with-your-db-password}
      POSTGRES_DB: ${DB_NAME:-secondeye_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diya_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-secondeye_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: diya-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@diya.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - diya_network
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: diya-api
    restart: always
    env_file:
      - .env
    environment:
      # Ensure db connects via Docker network
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/api:/app
    networks:
      - diya_network
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "fastapi", "run", "app/main.py", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  simulator-goggle:
    build:
      context: .
      dockerfile: infra/docker/simulator.Dockerfile
    container_name: diya-simulator
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./hardware/smart-goggles/simulator:/app
    networks:
      - diya_network
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9000", "--reload"]
